<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDramaHub VIP</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a0000; color: gold; text-align: center; font-family: sans-serif; overflow: hidden; }
        #gate { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #4a0000 0%, #000 100%); }
        .logo { width: 110px; border-radius: 50%; border: 3px solid gold; margin-bottom: 15px; box-shadow: 0 0 15px gold; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255,215,0,0.1); border-top: 5px solid #ff3333; border-radius: 50%; animation: spin 1s linear infinite; display: none; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        button { padding: 15px 40px; background: linear-gradient(#ff3333, #800000); color: white; border: 1px solid gold; border-radius: 8px; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
        #main-content { display: none; width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
        /* ANTI-SS: ITEMIN LAYAR PAS DISENTUH */
        body:active { filter: brightness(0); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="gate">
        <img src="https://i.ibb.co.com/G4J3nVBp/1001428751.jpg" class="logo">
        <h2 id="msg" style="color: #ff3333;">CDramaHub VIP</h2>
        <div id="loading" class="spinner"></div>
        <div id="ui">
            <p id="info">Mengecek Lisensi Kaisar...</p>
            <button onclick="prosesVerifikasi()">VERIFIKASI & MASUK</button>
        </div>
    </div>

    <div id="main-content">
        <iframe id="drama-frame" src=""></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sisaWaktu = parseInt(urlParams.get('exp')) || 0;

        function prosesVerifikasi() {
            if (sisaWaktu <= 0) {
                alert("❌ AKSES DITOLAK! VIP Habis atau Ilegal.");
                window.location.href = "https://t.me/CDramaHub_bot";
                return;
            }

            document.getElementById('ui').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('msg').innerText = "MEMERIKSA DATABASE...";

            setTimeout(() => {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('drama-frame').src = "https://drama.sansekai.my.id/";

                // SISTEM TENDANG OTOMATIS
                let timerRemaining = sisaWaktu;
                let countdown = setInterval(() => {
                    timerRemaining--;
                    
                    if (timerRemaining === 60) {
                        alert("⚠️ WADUH! VIP sisa 1 menit. Buruan perpanjang cuma 2k!");
                    }

                    if (timerRemaining <= 0) {
                        clearInterval(countdown);
                        alert("❌ WAKTU VIP HABIS! Kamu akan dikeluarkan otomatis.");
                        window.location.href = "https://t.me/CDramaHub_bot";
                    }
                }, 1000);
            }, 3000);
        }
    </script>
</body>
</html>

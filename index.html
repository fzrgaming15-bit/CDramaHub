<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDramaHub VIP</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a0000; color: #ffd700; text-align: center; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #gate { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #4a0000 0%, #000 100%); }
        .logo { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #ffd700; margin-bottom: 20px; box-shadow: 0 0 15px #ffd700; object-fit: cover; }
        h2 { color: #ff3333; letter-spacing: 3px; text-shadow: 2px 2px 4px #000; }
        input { padding: 12px; border-radius: 8px; border: 2px solid #ff3333; background: #2a0000; color: #ffd700; width: 260px; text-align: center; margin-bottom: 15px; outline: none; font-weight: bold; }
        button { padding: 15px 40px; background: linear-gradient(#ff3333, #800000); color: white; border: 1px solid #ffd700; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255, 215, 0, 0.1); border-top: 5px solid #ff3333; border-radius: 50%; animation: spin 1s linear infinite; display: none; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* ANTI-SS: ITEMIN LAYAR PAS DISENTUH */
        body:active { filter: brightness(0); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="gate">
        <img src="https://i.ibb.co.com/G4J3nVBp/1001428751.jpg" class="logo">
        <h2 id="msg">CDRAMAHUB VIP</h2>
        
        <div id="form-ui">
            <p style="font-size: 13px; color: #ffd700; opacity: 0.8;">SISTEM VERIFIKASI KEKAISARAN</p>
            <input type="text" id="username" placeholder="MASUKKAN NAMA VIP..." autocomplete="off">
            <br>
            <button onclick="prosesVerifikasi()">VERIFIKASI & MASUK</button>
        </div>

        <div id="loading-area" style="display:none;">
            <div class="spinner" style="display:block;"></div>
            <p id="status-text">Memeriksa Lisensi...</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sisaWaktu = parseInt(urlParams.get('exp')) || 0;

        function prosesVerifikasi() {
            let nama = document.getElementById('username').value;
            
            if (nama.length < 3) {
                alert("NAMA VIP TIDAK VALID!");
                return;
            }

            if (sisaWaktu <= 0) {
                alert("❌ AKSES DITOLAK!\nVIP Kamu Habis atau Tidak Terdaftar.");
                window.location.href = "https://t.me/CDramaHub_bot";
                return;
            }

            // Jalankan Animasi Loading
            document.getElementById('form-ui').style.display = 'none';
            document.getElementById('loading-area').style.display = 'block';

            setTimeout(() => {
                document.getElementById('status-text').innerText = "MENYAMBUNGKAN KE SERVER...";
                setTimeout(() => {
                    // REDIRECT LANGSUNG (SOLUSI LAYAR HITAM)
                    window.location.href = "https://drama.sansekai.my.id/";
                }, 1500);
            }, 2000);

            // Timer Tendang Otomatis (jika user diam di halaman verifikasi)
            setTimeout(() => {
                if(window.location.href.includes('github.io')) {
                   alert("WAKTU HABIS!");
                   window.location.href = "https://t.me/CDramaHub_bot";
                }
            }, (sisaWaktu * 1000));
        }
    </script>
</body>
</html>
